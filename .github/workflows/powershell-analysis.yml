name: PowerShell Analysis

on:
  push:
    branches: [main]
    paths:
      - "Helpers/**/*.psm1"
      - "Scripts/**/*.ps1"
      - ".github/workflows/powershell-analysis.yml"
  pull_request:
    branches: [main]
    paths:
      - "Helpers/**/*.psm1"
      - "Scripts/**/*.ps1"
      - ".github/workflows/powershell-analysis.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze PowerShell
    runs-on: ubuntu-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force -ErrorAction Stop

      - name: Analyze scripts
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path Helpers,Scripts -Recurse -EnableExit
